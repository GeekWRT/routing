name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Fetching upstream..."
          git remote add upstream https://github.com/openwrt/routing.git
          git fetch origin master
          git fetch upstream master

          # Check if already up to date
          if git merge-base --is-ancestor origin/master upstream/master &&              git diff --quiet origin/master upstream/master; then
            echo "Already up to date with upstream"
            exit 0
          fi

          # Try fast-forward first
          git checkout master
          if git merge --ff-only upstream/master 2>/dev/null; then
            echo "Fast-forward merge successful"
          else
            echo "Not fast-forward, updating via merge..."
            # Use git merge to create a merge commit
            git merge -m "Merge upstream/master into master" upstream/master 2>/dev/null || {
              echo "CONFLICT! Manual resolution needed"
              git merge --abort
              exit 1
            }
          fi

          # Check if workflow files changed
          NEW_SHA=$(git rev-parse HEAD)
          echo "New HEAD: $NEW_SHA"

          if git diff --name-only HEAD..FETCH_HEAD -- .github/workflows/ 2>/dev/null | grep -q .; then
            echo "Workflow files changed, using API to update ref..."
            # Push the commit objects first, then update ref via API
            # Create the commit via Git Data API
            gh api "repos/${{ github.repository }}/git/refs/heads/master"               --field sha="$NEW_SHA"               --field force=true
            echo "Ref updated via API"
          else
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master
            echo "Push successful"
          fi
