name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.email "geekwrt@users.noreply.github.com"
          git config user.name "GeekWRT"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/openwrt/routing.git
          git fetch origin master
          git fetch upstream master
          git checkout master
          if git merge-base --is-ancestor origin/master upstream/master 2>/dev/null &&              git diff --quiet origin/master upstream/master 2>/dev/null; then
            echo "Already up to date"
            exit 0
          fi
          git rebase upstream/master || {
            echo "CONFLICT! aborting..."
            git rebase --abort
            exit 1
          }
          git push https://x-access-token:${{ secrets.GH_SYNC_TOKEN }}@github.com/${{ github.repository }}.git master --force
