name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream via Git Data API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          echo "Fetching upstream..."
          git remote add upstream https://github.com/openwrt/routing.git
          git fetch origin master
          git fetch upstream master

          UPSTREAM=$(git rev-parse upstream/master)
          FORK=$(git rev-parse origin/master)

          if [ "$UPSTREAM" = "$FORK" ] || git merge-base --is-ancestor origin/master upstream/master 2>/dev/null; then
            echo "Already up to date"
            exit 0
          fi

          # Get upstream's full tree
          echo "Fetching upstream tree..."
          gh api "repos/$REPO/git/trees/$UPSTREAM?recursive=1" > /tmp/upstream_tree.json

          # Get changed files
          CHANGED=$(git diff --name-only $UPSTREAM..$FORK)
          echo "Changed files:"
          echo "$CHANGED"

          # Build tree entries: start with upstream tree, then override changed files
          # First create blobs for changed files
          declare -A BLOB_MAP
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            CONTENT=$(git show $FORK:$f | base64 -w0)
            BLOB=$(gh api "repos/$REPO/git/blobs" \
              --field content="$CONTENT" \
              --field encoding="base64" \
              --jq '.sha')
            BLOB_MAP["$f"]="$BLOB"
            echo "  $f -> $BLOB"
          done <<< "$CHANGED"

          # Build tree JSON: update our files in upstream tree
          TREE_JSON="[]"
          jq -c '.tree[]' /tmp/upstream_tree.json | while read -r entry; do
            path=$(echo "$entry" | jq -r '.path')
            # Check if this file is in our changed list
            if [[ -v BLOB_MAP["$path"] ]]; then
              new_sha="${BLOB_MAP[$path]}"
            else
              new_sha=$(echo "$entry" | jq -r '.sha')
            fi
            mode=$(echo "$entry" | jq -r '.mode')
            type=$(echo "$entry" | jq -r '.type')
            # Append to tree
            printf '%s\n' "{\"path\":\"$path\",\"mode\":\"$mode\",\"type\":\"$type\",\"sha\":\"$new_sha\"}"
          done | jq -s '.' > /tmp/new_tree_entries.json

          # Create tree on GitHub
          echo "Creating tree..."
          NEW_TREE=$(gh api "repos/$REPO/git/trees" \
            --field tree="$(cat /tmp/new_tree_entries.json)" \
            --jq '.sha')

          # Create merge commit
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Creating merge commit..."
          MERGE_SHA=$(gh api "repos/$REPO/git/commits" \
            --field message="Merge upstream/master into master" \
            --field tree="$NEW_TREE" \
            --field parents[]="$UPSTREAM" \
            --field parents[]="$FORK" \
            --field 'author[name]=GeekWRT' \
            --field 'author[email]=geekwrt@users.noreply.github.com' \
            --field 'author[date]=$NOW' \
            --field 'committer[name]=GeekWRT' \
            --field 'committer[email]=geekwrt@users.noreply.github.com' \
            --field 'committer[date]=$NOW' \
            --jq '.sha')

          # Update ref
          echo "Updating master ref..."
          gh api -X PATCH "repos/$REPO/git/refs/heads/master" \
            --field sha="$MERGE_SHA" \
            --field force=true \
            --jq '.object.sha'

          echo "Synced to: $MERGE_SHA"
